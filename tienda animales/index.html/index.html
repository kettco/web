<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patitas Felices</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#f5f5f5;
    }

    header{
      background:#2E8B57;
      color:white;
      text-align:center;
      padding:50px;
    }

    nav{
      background:#1f6d45;
      text-align:center;
      padding:15px;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin:20px;
      font-weight:bold;
    }

    .hero{
      text-align:center;
      padding:60px;
    }

    .hero h2{
      font-size:40px;
    }

    .productos{
      display:flex;
      justify-content:center;
      gap:30px;
      flex-wrap:wrap;
      padding:40px;
    }

    .producto{
      background:white;
      width:250px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,.2);
      text-align:center;
      padding:20px;
    }

    .producto img{
      width:100%;
      border-radius:10px;
    }

    button{
      background:#2E8B57;
      color:white;
      border:none;
      padding:10px 20px;
      border-radius:5px;
      cursor:pointer;
    }

    footer{
      background:#2E8B57;
      color:white;
      text-align:center;
      padding:20px;
      margin-top:40px;
    }
  </style>
</head>

<body>

<header>
<h1>🐾 Patitas Felices</h1>
<p>Todo para tu mascota</p>
</header>

<nav>
<a href="#">Inicio</a>
<a href="#">Perros</a>
<a href="#">Gatos</a>
<a href="#">Contacto</a>
</nav>

<section class="hero">
<h2>Bienvenido a nuestra tienda</h2>
<p>Encuentra los mejores productos para tus mascotas.</p>
</section>

<section class="productos">

<div class="producto">
<img src="https://placehold.co/250x250?text=Pienso" alt="Pienso">
<h3>Pienso Premium</h3>
<p>24,99 €</p>
<button>Comprar</button>
</div>

<div class="producto">
<img src="https://placehold.co/250x250?text=Cama" alt="Cama">
<h3>Cama para perro</h3>
<p>39,99 €</p>
<button>Comprar</button>
</div>

<div class="producto">
<img src="https://placehold.co/250x250?text=Juguete" alt="Juguete">
<h3>Juguete para gato</h3>
<p>9,99 €</p>
<button>Comprar</button>
</div>

</section>

<footer>
© 2026 Patitas Felices
</footer>

</body>
</html>
